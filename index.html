<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Dojo</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Solana Wallet Adapter CDN -->
    <script src="https://unpkg.com/@solana/wallet-adapter-phantom@0.9.15/dist/bundle.iife.js"></script>
    <style>
        /* Font Imports */
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Noto+Sans+JP:wght@700&family=Zen+Antique&display=swap');
        .font-vt323 { font-family: 'VT323', monospace; }
        .font-noto-sans-jp { font-family: 'Noto Sans JP', sans-serif; }
        .font-zen-antique { font-family: 'Zen Antique', serif; }
        body {
            font-family: 'VT323', monospace;
            background-color: #1f2937;
        }
        .wallet-connect-button {
            @apply w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 border-2 border-red-400 text-white font-bold py-4 px-8 text-lg rounded-xl transition-all duration-300 shadow-lg hover:shadow-red-500/50;
        }
        .message-box {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 1000;
            background-color: #333;
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: none;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen relative overflow-hidden font-vt323">

    <!-- Background Image and Overlay -->
    <div
        class="absolute inset-0 bg-cover bg-center bg-no-repeat"
        style="background-image: url('dojo-bg.jpg.jpg'); filter: brightness(0.4); background-size: cover; background-position: center;">
    </div>
    <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80"></div>

    <!-- Main Content Container -->
    <div class="relative z-10 flex items-center justify-center min-h-screen p-4">
        <div class="text-center max-w-2xl w-full">
            <div id="app-container" class="bg-black/30 backdrop-blur-lg rounded-3xl p-10 border-2 border-red-500/50 shadow-2xl">
                <!-- Content will be injected here by JavaScript -->
            </div>
        </div>
    </div>
    
    <!-- Message Box for Alerts -->
    <div id="messageBox" class="message-box"></div>

    <script>
        // Placeholder Icons as inline SVG strings for easy use in JS
        const icons = {
            Coins: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 text-yellow-400">
                      <circle cx="8" cy="8" r="6" />
                      <path d="M18.09 10.37A6 6 0 1 1 10.34 18M7 6h1.22a9 9 0 0 0 6.66 12.66" />
                    </svg>`,
            Clock: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-red-400">
                      <circle cx="12" cy="12" r="10" />
                      <polyline points="12 6 12 12 16 14" />
                    </svg>`,
            Swords: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 text-white animate-pulse">
                      <polyline points="14.5 17.5 17.5 14.5" />
                      <path d="M2.5 13.5l1.5 1.5c-3-3 6-6 9-9l1.5 1.5" />
                      <path d="M11 22l1.5-1.5c3 3 6-6 9-9l-1.5-1.5" />
                      <path d="M4 16l-1.5-1.5c-3 3-6 6-9 9l1.5 1.5" />
                    </svg>`,
            Zap: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-yellow-400">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                  </svg>`,
            Trophy: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-yellow-400">
                      <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
                      <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
                      <path d="M4.5 15.5H19.5" />
                      <path d="M12 17.5v3" />
                      <path d="M19.5 9h-15V4a1 1 0 0 1 1-1h13a1 1 0 0 1 1 1z" />
                      <path d="M12 17.5a2.5 2.5 0 0 1-2.5-2.5v-10h5v10a2.5 2.5 0 0 1-2.5 2.5z" />
                    </svg>`,
        };

        const appContainer = document.getElementById('app-container');
        const messageBox = document.getElementById('messageBox');
        let wallet = null;
        let publicKey = null;
        let tetoBalance = 0;
        let isVerified = false;
        let lastClaimTime = null;
        let timeUntilNextClaim = 0;
        let timerInterval = null;

        // A simple toast-like notification system
        const showMessage = (message) => {
            messageBox.textContent = message;
            messageBox.style.display = 'block';
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
        };

        // Utility function to format time in minutes and seconds
        const formatTime = (ms) => {
            if (ms <= 0) return 'Ready to Claim!';
            const minutes = Math.floor(ms / (1000 * 60));
            const seconds = Math.floor((ms % (1000 * 60)) / 1000);
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        };

        // Utility function to truncate the public key for display
        const truncatePublicKey = (key) => {
            if (!key) return '';
            const keyStr = key.toString();
            return `${keyStr.substring(0, 4)}...${keyStr.slice(-4)}`;
        };

        // Renders the view when the wallet is not connected
        const renderDisconnectedView = () => {
            appContainer.innerHTML = `
                <div>
                    <div class="mb-6">
                        <h3 class="text-3xl font-bold text-red-900 mb-4 font-noto-sans-jp">
                            TRUE DEGENS WELCOME
                        </h3>
                        <p class="text-red-200 text-lg leading-relaxed">
                            Connect your Solana wallet to verify your holder status and begin your training. Earn <span class="text-red-900 font-bold">Teto</span> rewards every hour and test your luck on the <span class="text-red-900 font-bold">Wheel</span>!
                        </p>
                    </div>
                    <div class="text-center mb-6">
                        <p class="mb-2 text-red-200 font-semibold flex items-center justify-center space-x-2">
                            <span class="text-red-900">⛩</span>
                            <span>Hourly Teto Rewards</span>
                        </p>
                        <p class="mb-2 text-red-200 font-semibold flex items-center justify-center space-x-2">
                            <span class="text-red-900">⛩</span>
                            <span>Lottery Wheel Gambling</span>
                        </p>
                        <p class="text-red-200 font-semibold flex items-center justify-center space-x-2">
                            <span class="text-red-900">⛩</span>
                            <span>Degen Duels</span>
                        </p>
                    </div>
                    <div class="relative">
                        <button id="connect-button" class="wallet-connect-button relative z-20">
                            Connect Wallet
                        </button>
                        <div class="absolute -inset-1 bg-gradient-to-r from-red-600 to-red-400 rounded-xl blur opacity-30 animate-pulse z-10"></div>
                    </div>
                </div>
            `;
            document.getElementById('connect-button').addEventListener('click', connectWallet);
        };

        // Renders the view when the wallet is connected
        const renderConnectedView = () => {
            appContainer.innerHTML = `
                <div>
                    <header class="mb-8">
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 class="text-3xl font-bold text-red-900">TETO REWARDS</h2>
                            </div>
                            <div class="flex items-center space-x-4">
                                <button id="disconnect-button" class="bg-gray-700 hover:bg-gray-800 text-red-900 font-bold py-2 px-4 rounded-xl transition-colors">
                                    Disconnect
                                </button>
                                <span class="text-red-900">Connected: ${truncatePublicKey(publicKey)}</span>
                            </div>
                        </div>
                    </header>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-1 space-y-6">
                            <div class="bg-black/30 backdrop-blur-lg rounded-3xl p-8 border-2 border-red-500/50 shadow-2xl">
                                <h3 class="text-2xl font-bold text-red-900 mb-4 font-vt323">NFT Verification</h3>
                                <p id="verification-status" class="text-red-200 font-vt323">
                                    ${isVerified ? "You are a verified NFT warrior!" : "Verify your NFT to claim rewards."}
                                </p>
                            </div>
                            <div class="bg-black/30 backdrop-blur-lg rounded-3xl p-8 border-2 border-red-500/50 shadow-2xl">
                                <h3 class="text-2xl font-bold text-red-900 mb-4 font-vt323">Teto Rewards</h3>
                                <div class="flex items-center space-x-2 mt-4">
                                    ${icons.Coins}
                                    <span id="teto-balance" class="text-4xl font-bold text-red-900 font-vt323">${tetoBalance} TETO</span>
                                </div>
                                <div class="mt-4">
                                    <div class="flex items-center justify-between text-red-200 font-vt323">
                                        <div class="flex items-center space-x-2">
                                            ${icons.Clock}
                                            <span>Next Claim:</span>
                                        </div>
                                        <span id="claim-timer" class="text-xl font-bold">
                                            ${isVerified ? formatTime(timeUntilNextClaim) : 'Not Verified'}
                                        </span>
                                    </div>
                                </div>
                                <button
                                    id="claim-reward-btn"
                                    class="w-full mt-6 py-3 px-6 rounded-xl font-bold transition-all duration-300 font-vt323
                                    ${!isVerified || timeUntilNextClaim > 0 ? 'bg-gray-700 text-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 text-white shadow-lg hover:shadow-green-500/50'}"
                                    ${!isVerified || timeUntilNextClaim > 0 ? 'disabled' : ''}>
                                    Claim 10 TETO
                                </button>
                            </div>
                        </div>
                        <div class="lg:col-span-2">
                            <div class="bg-black/30 backdrop-blur-lg rounded-3xl p-8 border-2 border-red-500/50 shadow-2xl">
                                <h3 class="text-2xl font-bold text-red-900 mb-4 font-vt323">Lottery Wheel</h3>
                                <p class="text-red-200 font-vt323">
                                    The wheel of fortune is not yet implemented.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('disconnect-button').addEventListener('click', disconnectWallet);
            document.getElementById('claim-reward-btn').addEventListener('click', claimHourlyReward);
        };

        // Updates the UI state, called after state changes
        const updateUI = () => {
            if (publicKey) {
                document.getElementById('teto-balance').textContent = `${tetoBalance} TETO`;
                document.getElementById('verification-status').textContent = isVerified ? "You are a verified NFT warrior!" : "Verify your NFT to claim rewards.";
                document.getElementById('claim-timer').textContent = isVerified ? formatTime(timeUntilNextClaim) : 'Not Verified';
                
                const claimBtn = document.getElementById('claim-reward-btn');
                const canClaim = isVerified && timeUntilNextClaim <= 0;
                claimBtn.disabled = !canClaim;
                if (canClaim) {
                    claimBtn.classList.add('bg-green-600', 'hover:bg-green-700', 'text-white', 'shadow-lg', 'hover:shadow-green-500/50');
                    claimBtn.classList.remove('bg-gray-700', 'text-gray-400', 'cursor-not-allowed');
                } else {
                    claimBtn.classList.add('bg-gray-700', 'text-gray-400', 'cursor-not-allowed');
                    claimBtn.classList.remove('bg-green-600', 'hover:bg-green-700', 'text-white', 'shadow-lg', 'hover:shadow-green-500/50');
                }
            }
        };

        // Loads state from local storage and starts the timer
        const loadState = () => {
            if (publicKey) {
                const pubKeyStr = publicKey.toString();
                tetoBalance = parseInt(localStorage.getItem(`teto_balance_${pubKeyStr}`)) || 0;
                lastClaimTime = parseInt(localStorage.getItem(`last_claim_${pubKeyStr}`)) || null;
                isVerified = JSON.parse(localStorage.getItem(`verified_${pubKeyStr}`)) || false;
                
                // For demonstration, let's assume verification is successful for now.
                // In a real app, this would be a check against a blockchain.
                isVerified = true;
                localStorage.setItem(`verified_${pubKeyStr}`, JSON.stringify(true));

                // Start or restart the timer
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    const now = Date.now();
                    const hourInMs = 60 * 60 * 1000;
                    const timeSinceLastClaim = now - (lastClaimTime || now);
                    const timeLeft = hourInMs - timeSinceLastClaim;
                    timeUntilNextClaim = timeLeft > 0 ? timeLeft : 0;
                    updateUI(); // Update UI every second
                }, 1000);
            }
        };

        // Function to connect a wallet
        const connectWallet = async () => {
            try {
                const { solana } = window;
                if (solana && solana.isPhantom) {
                    wallet = solana;
                    const response = await wallet.connect();
                    publicKey = response.publicKey;
                    
                    loadState();
                    renderConnectedView();
                    updateUI();
                    
                    showMessage(`Wallet connected: ${publicKey.toString()}`);
                } else {
                    showMessage('Phantom wallet not found! Please install Phantom.');
                }
            } catch (error) {
                console.error('Failed to connect wallet:', error);
                showMessage('Failed to connect wallet. See console for details.');
            }
        };

        // Function to disconnect the wallet
        const disconnectWallet = async () => {
            if (wallet) {
                await wallet.disconnect();
                publicKey = null;
                wallet = null;
                if (timerInterval) clearInterval(timerInterval);
                renderDisconnectedView();
                showMessage('Wallet disconnected.');
            }
        };

        // Function to handle the hourly reward claim
        const claimHourlyReward = () => {
            if (!isVerified || !publicKey) return;
            
            const now = Date.now();
            const hourInMs = 60 * 60 * 1000;
            
            if (!lastClaimTime || (now - lastClaimTime) >= hourInMs) {
                const reward = 10;
                tetoBalance += reward;
                lastClaimTime = now;
                
                const pubKeyStr = publicKey.toString();
                localStorage.setItem(`teto_balance_${pubKeyStr}`, tetoBalance.toString());
                localStorage.setItem(`last_claim_${pubKeyStr}`, lastClaimTime.toString());
                
                showMessage(`Claimed 10 TETO! New balance: ${tetoBalance}`);
                loadState(); // Reload the state to refresh the timer
            } else {
                showMessage("It's not time to claim yet!");
            }
        };
        
        // Initial render on page load
        document.addEventListener('DOMContentLoaded', renderDisconnectedView);
    </script>
</body>
</html>
