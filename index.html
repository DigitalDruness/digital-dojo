<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Dojo</title>
    <!-- Tailwind CSS from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Solana Web3.js for blockchain interaction -->
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.91.1/lib/index.iife.js"></script>
    <!-- Firebase core, auth, and firestore -->
    <script type="module">
        // Import all Firebase functions as a single object from their respective modules.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import * as firestore from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import * as auth from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        // IMPORTANT: These are global variables provided by the Canvas environment.
        // DO NOT change their names.
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        // Initialize Firebase app and services
        const app = initializeApp(firebaseConfig);
        window.db = firestore.getFirestore(app);
        window.auth = auth.getAuth(app);
        
        // Expose the entire Firestore and Auth modules to the global scope.
        // This is a crucial fix that makes all their functions accessible to the React component
        // which runs in a different script context.
        window.firestore = firestore;
        window.firebaseAuth = auth;
        
        // Use the provided custom auth token to sign in
        if (initialAuthToken) {
            auth.signInWithCustomToken(window.auth, initialAuthToken).then(() => {
                console.log("Firebase signed in with custom token.");
            }).catch((error) => {
                console.error("Firebase custom token sign-in failed:", error);
            });
        } else {
             // Fallback to anonymous sign-in if no custom token is available
            auth.signInAnonymously(window.auth).then(() => {
                console.log("Firebase signed in anonymously.");
            }).catch((error) => {
                console.error("Firebase anonymous sign-in failed:", error);
            });
        }
    </script>
    <style>
        /* Font Imports */
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Noto+Sans+JP:wght@700&family=Zen+Antique&display=swap');
        .font-vt323 { font-family: 'VT323', monospace; }
        .font-noto-sans-jp { font-family: 'Noto Sans JP', sans-serif; }
        .font-zen-antique { font-family: 'Zen Antique', serif; }
        body {
            font-family: 'VT323', monospace;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { PublicKey } = solanaWeb3;
        // Destructure all needed functions from the global objects exposed by the module script.
        const { doc, getDoc, setDoc, onSnapshot, updateDoc } = window.firestore;
        const { onAuthStateChanged, signInWithCustomToken, signInAnonymously } = window.firebaseAuth;

        // The main App component that handles all state and rendering
        const App = () => {
            // State variables to manage the application's data and UI
            const [tetoBalance, setTetoBalance] = useState(0);
            const [isVerified, setIsVerified] = useState(false);
            const [isVerifying, setIsVerifying] = useState(false);
            const [nftCount, setNftCount] = useState(0);
            const [lastClaimTime, setLastClaimTime] = useState(null);
            const [timeUntilNextClaim, setTimeUntilNextClaim] = useState(0);
            const [wallet, setWallet] = useState(null);
            const [publicKey, setPublicKey] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [verificationStatus, setVerificationStatus] = useState('');
            const [isCheckingTime, setIsCheckingTime] = useState(false);
            const [userId, setUserId] = useState(null);
            const [isAuthReady, setIsAuthReady] = useState(false);

            // Helius RPC Endpoint and API Key
            const heliusRpcUrl = 'https://rpc.helius.xyz/?api-key=6e2b3a8b-d410-46b1-9cc9-53d9dec76d02';

            // Mint addresses for the NFT collections
            const nftMintAddresses = [
                'J7ZoA72tbHffX1T6hmJbwZZZvT7SU144k3bDfKxHkhKF', // Degen Dojo original
                '8gFdLpbWGMX1KnsLwnNcQehxshLsDP5exYSAihtvJN15',  // Demon Dojo original
                '2m9DupVeheZ5vfuXZxqV3KSQ7HnVDk2tG6ouH1ZnLwYb', // New Degen Dojo
                'dgd6We3oS4M4LSVzT6Ep39wwVpjLC336tCpyPZkLAHx',  // New Demon Dojo
                'ED3GMCfoX3XNvavnWADvd6oCsohGg1ukdhv3PaUpvwJe', // Another address
                'FdpDYUWYC8PekGttXz9kPb48CxVjpiEm5NaBb3X6zExy', // Another address
                'B6WhJ15NYp6vxJD3K8hCxZUUqpap1kngHKE66GczGNrg',  // Another address
                'DoJoE6b8Lbb1t8qcdm4qDRXLS7RvadZo9Rfz8xq2VgLx',  // Latest address
                'HEyazxpV2wxMUvNx53UZUXthRS9Rjsbv7hoHYJNbVedC'   // Latest address
            ];

            // Function to get a reliable, non-local timestamp from a public API
            const getUTCTimeFromAPI = async () => {
                try {
                    const response = await fetch('http://worldtimeapi.org/api/timezone/Etc/UTC');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const data = await response.json();
                    return new Date(data.datetime).getTime();
                } catch (error) {
                    console.error('Failed to fetch server time:', error);
                    // Fallback to local time if API fails, with a warning
                    console.warn('Using local time as a fallback. This may be inaccurate and susceptible to manipulation.');
                    return Date.now();
                }
            };
            
            // --- Firebase Integration ---
            useEffect(() => {
                // Set up Firebase auth state listener to get the user ID
                const authUnsubscribe = onAuthStateChanged(window.auth, (user) => {
                    if (user) {
                        setUserId(user.uid);
                        setIsAuthReady(true);
                    } else {
                        console.log("No user signed in.");
                        setUserId(null);
                        setIsAuthReady(true);
                    }
                });
                
                // Clean up auth listener on unmount
                return () => authUnsubscribe();
            }, []);

            useEffect(() => {
                // Ensure auth and a public key are ready before trying to fetch data
                if (!isAuthReady || !publicKey) return;

                // Create a user-specific document reference in Firestore
                const userDocRef = doc(window.db, `artifacts/${__app_id}/users/${userId}/data`, publicKey.toString());

                // Set up a real-time listener for the user's data
                const unsubscribe = onSnapshot(userDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setTetoBalance(data.tetoBalance || 0);
                        setIsVerified(data.isVerified || false);
                        setNftCount(data.nftCount || 0);
                        setLastClaimTime(data.lastClaimTime || null);
                        setVerificationStatus(data.verificationStatus || '');
                    } else {
                        console.log("User data not found in Firestore. Creating new entry.");
                        // Create a new document if it's not present
                        setDoc(userDocRef, {
                            tetoBalance: 0,
                            isVerified: false,
                            nftCount: 0,
                            lastClaimTime: null,
                            verificationStatus: ''
                        }).catch(e => console.error("Error creating document: ", e));
                        setTetoBalance(0);
                        setIsVerified(false);
                        setNftCount(0);
                        setLastClaimTime(null);
                        setVerificationStatus('');
                    }
                }, (error) => {
                    console.error("Firestore listener error:", error);
                });

                // Clean up the listener when the component unmounts or publicKey changes
                return () => unsubscribe();
            }, [isAuthReady, publicKey, userId]);

            // Timer logic for the 24-hour cooldown
            useEffect(() => {
                let timerInterval = null;
                const dailyInMs = 24 * 60 * 60 * 1000;

                if (lastClaimTime !== null) {
                    timerInterval = setInterval(async () => {
                        const now = await getUTCTimeFromAPI();
                        const timeSinceLastClaim = now - lastClaimTime;
                        const timeLeft = dailyInMs - timeSinceLastClaim;
                        setTimeUntilNextClaim(timeLeft > 0 ? timeLeft : 0);
                        setIsCheckingTime(false);
                    }, 1000);
                } else if (isAuthReady) {
                    setTimeUntilNextClaim(0); // Allow immediate claim if no lastClaimTime
                    setIsCheckingTime(false);
                }
                
                return () => {
                    if (timerInterval) {
                        clearInterval(timerInterval);
                    }
                };
            }, [lastClaimTime, isAuthReady]);

            // Function to connect a wallet
            const connectWallet = async (walletName) => {
                try {
                    let selectedWallet = null;
                    if (walletName === 'Phantom') {
                        if (!window.solana || !window.solana.isPhantom) {
                            console.log('Phantom wallet not found. Please install it.');
                            setShowModal(false);
                            return;
                        }
                        selectedWallet = window.solana;
                    } else if (walletName === 'Solflare') {
                        if (!window.solflare) {
                            console.log('Solflare wallet not found. Please install it.');
                            setShowModal(false);
                            return;
                        }
                        selectedWallet = window.solflare;
                    } else {
                        return;
                    }
                    
                    const resp = await selectedWallet.connect();
                    setWallet(selectedWallet);
                    setPublicKey(resp.publicKey);
                    setShowModal(false);
                } catch (err) {
                    console.error('Wallet connection failed:', err);
                }
            };

            // Function to disconnect the wallet
            const disconnectWallet = () => {
                if (wallet) {
                    wallet.disconnect();
                    setPublicKey(null);
                    setWallet(null);
                }
            };

            // Function to handle the NFT verification check using the Helius API
            const verifyNFT = async () => {
                if (!publicKey || !isAuthReady) return;
                setIsVerifying(true);
                setVerificationStatus('Verifying...');
                
                const userDocRef = doc(window.db, `artifacts/${__app_id}/users/${userId}/data`, publicKey.toString());

                try {
                    const response = await fetch(heliusRpcUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            jsonrpc: '2.0',
                            id: 'my-id',
                            method: 'getAssetsByOwner',
                            params: {
                                ownerAddress: publicKey.toString(),
                                displayOptions: {
                                    showFungible: false,
                                    showUnverifiedCollections: false,
                                    showCollectionMetadata: true
                                }
                            }
                        })
                    });

                    const data = await response.json();
                    const assets = data.result.items;
                    let holderCount = 0;

                    // Iterate through the NFTs returned by Helius to count owned NFTs
                    for (const asset of assets) {
                        if (nftMintAddresses.includes(asset.id)) {
                            holderCount++;
                        }
                    }

                    const isHolder = holderCount > 0;
                    
                    // Update the Firestore document with the new verification data
                    await setDoc(userDocRef, {
                        isVerified: isHolder,
                        nftCount: holderCount,
                        verificationStatus: isHolder ? `Verified! You hold ${holderCount} NFTs.` : 'Not a holder.'
                    }, { merge: true });

                } catch (error) {
                    console.error('Failed to verify NFT ownership:', error);
                    // Update Firestore with the error status
                    await setDoc(userDocRef, {
                        isVerified: false,
                        nftCount: 0,
                        verificationStatus: 'Verification failed. Try again.'
                    }, { merge: true });
                } finally {
                    setIsVerifying(false);
                }
            };

            // Function to handle the daily reward claim
            const claimDailyReward = async () => {
                if (!isVerified || !publicKey || isCheckingTime) return;
                
                const userDocRef = doc(window.db, `artifacts/${__app_id}/users/${userId}/data`, publicKey.toString());
                
                // Fetch current time from a reliable source to prevent client-side time manipulation
                const now = await getUTCTimeFromAPI();
                const dailyInMs = 24 * 60 * 60 * 1000;
                
                // Check if the time since the last claim is at least 24 hours
                if (!lastClaimTime || (now - lastClaimTime) >= dailyInMs) {
                    const reward = 10 * nftCount; // Reward is now based on NFT count
                    
                    // Atomically update the balance and timestamp in Firestore
                    await setDoc(userDocRef, {
                        tetoBalance: tetoBalance + reward,
                        lastClaimTime: now
                    }, { merge: true });
                } else {
                     console.log('Claim not yet available. Please wait until cooldown is over.');
                }
            };

            // Utility function to format time in HH:MM:SS
            const formatTime = (ms) => {
                if (ms <= 0) return 'Ready!';
                const seconds = Math.floor(ms / 1000);
                const minutes = Math.floor(seconds / 60);
                const hours = Math.floor(minutes / 60);

                const displayHours = String(hours).padStart(2, '0');
                const displayMinutes = String(minutes % 60).padStart(2, '0');
                const displaySeconds = String(seconds % 60).padStart(2, '0');
                
                return `${displayHours}:${displayMinutes}:${displaySeconds}`;
            };

            // Utility function to truncate the public key for display
            const truncatePublicKey = (key) => {
                if (!key) return '';
                const keyStr = key.toString();
                return `${keyStr.substring(0, 4)}...${keyStr.slice(-4)}`;
            };

            const isConnected = !!publicKey;
            // A claim is possible if verified AND the daily cooldown has passed
            const canClaim = isVerified && timeUntilNextClaim === 0 && !isCheckingTime;
            const rewardAmount = nftCount * 10;
            const isLoading = !isAuthReady || (isConnected && !userId);

            if (isLoading) {
                return (
                    <div className="bg-gray-900 text-white min-h-screen flex items-center justify-center font-vt323">
                        <div className="text-center">
                            <h2 className="text-3xl font-bold text-red-900 mb-4 animate-pulse">Loading...</h2>
                            <p className="text-red-200">Initializing app and connecting to database.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-gray-900 text-white min-h-screen relative overflow-hidden font-vt323">
                    {/* Background Image and Overlay */}
                    <div
                        className="absolute inset-0 bg-cover bg-center bg-no-repeat"
                        style={{
                            backgroundImage: `url('dojo-bg.jpg')`,
                            filter: 'brightness(0.4)',
                            backgroundSize: 'cover',
                            backgroundPosition: 'center',
                        }}>
                    </div>

                    {/* Main Content Container */}
                    <div className="relative z-10 flex items-center justify-center min-h-screen p-4">
                        <div className="text-center max-w-2xl">
                            <div id="app-container" className="bg-black/40 backdrop-blur-sm rounded-3xl p-10 border-2 border-red-500/50 shadow-2xl">
                                {/* Conditional rendering based on connection status */}
                                {!isConnected ? (
                                    // Disconnected view
                                    <div>
                                        <div className="mb-6">
                                            <h3 className="text-3xl font-bold text-red-900 mb-4 font-noto-sans-jp">
                                                TRUE DEGENS WELCOME
                                            </h3>
                                            <p className="text-red-200 text-lg leading-relaxed">
                                                Connect your Solana wallet to verify your holder status and begin your training. Earn <span className="text-red-900 font-bold">Teto</span> rewards every day and test your luck on the <span className="text-red-900 font-bold">Wheel</span>!
                                            </p>
                                        </div>
                                        <div className="text-center mb-6">
                                            <p className="mb-2 text-red-200 font-semibold flex items-center justify-center space-x-2">
                                                <span className="text-red-900">⛩</span>
                                                <span>Daily Teto Rewards</span>
                                            </p>
                                            <p className="mb-2 text-red-200 font-semibold flex items-center justify-center space-x-2">
                                                <span className="text-red-900">⛩</span>
                                                <span>Lottery Wheel Gambling</span>
                                            </p>
                                            <p className="mb-2 text-red-200 font-semibold flex items-center justify-center space-x-2">
                                                <span className="text-red-900">⛩</span>
                                                <span>Degen Duels</span>
                                            </p>
                                        </div>
                                        <div className="relative">
                                            <button
                                                id="connect-button"
                                                className="wallet-connect-button relative z-20"
                                                onClick={() => setShowModal(true)}>
                                                Connect Wallet
                                            </button>
                                            <div className="absolute -inset-1 bg-gradient-to-r from-red-600 to-red-400 rounded-xl opacity-90 animate-pulse z-10"></div>
                                        </div>
                                    </div>
                                ) : (
                                    // Connected view
                                    <div>
                                        <header className="mb-8">
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <h2 className="text-3xl font-bold text-red-900">TETO REWARDS</h2>
                                                </div>
                                                <div className="flex items-center space-x-4">
                                                    <button
                                                        id="disconnect-button"
                                                        className="bg-gray-700 hover:bg-gray-800 text-red-900 font-bold py-2 px-4 rounded-xl transition-colors"
                                                        onClick={disconnectWallet}>
                                                        Disconnect
                                                    </button>
                                                    <span className="text-red-900">Connected: {truncatePublicKey(publicKey)}</span>
                                                </div>
                                            </div>
                                        </header>
                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                            <div className="lg:col-span-1 space-y-6">
                                                <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 border-2 border-red-500/50 shadow-2xl">
                                                    <h3 className="text-2xl font-bold text-red-900 mb-4 font-vt323">NFT Verification</h3>
                                                    {isVerified ? (
                                                        <p className="text-red-200 font-vt323">
                                                            You are a verified True Degen!
                                                        </p>
                                                    ) : (
                                                        <>
                                                            <p className="text-red-200 font-vt323 mb-4">
                                                                Verify your NFT to claim rewards.
                                                            </p>
                                                            <button
                                                                id="verify-nft-btn"
                                                                className={`w-full py-3 px-6 rounded-xl font-bold transition-all duration-300 font-vt323 ${isVerifying ? 'bg-yellow-600 text-yellow-100 cursor-not-allowed' : 'bg-red-600 hover:bg-red-700 text-white shadow-lg hover:shadow-red-500/50'}`}
                                                                disabled={isVerifying}
                                                                onClick={verifyNFT}>
                                                                {isVerifying ? 'Verifying...' : 'Verify NFT'}
                                                            </button>
                                                            {verificationStatus && <p className="mt-4 text-center text-red-400 font-vt323">{verificationStatus}</p>}
                                                        </>
                                                    )}
                                                </div>
                                                <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 border-2 border-red-500/50 shadow-2xl">
                                                    <h3 className="text-2xl font-bold text-red-900 mb-4 font-vt323">Teto Rewards</h3>
                                                    <div className="flex items-center space-x-2 mt-4">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8 text-yellow-400">
                                                            <circle cx="8" cy="8" r="6" />
                                                            <path d="M18.09 10.37A6 6 0 1 1 10.34 18M7 6h1.22a9 9 0 0 0 6.66 12.66" />
                                                        </svg>
                                                        <span className="text-4xl font-bold text-red-900 font-vt323">{tetoBalance} TETO</span>
                                                    </div>
                                                    <div className="mt-4">
                                                        <div className="flex items-center justify-between text-red-200 font-vt323">
                                                            <div className="flex items-center space-x-2">
                                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-red-400">
                                                                    <circle cx="12" cy="12" r="10" />
                                                                    <polyline points="12 6 12 12 16 14" />
                                                                </svg>
                                                                <span>Next Claim:</span>
                                                            </div>
                                                            <span id="claim-timer" className="text-xl font-bold">
                                                                {isCheckingTime ? 'Checking time...' : (isVerified ? formatTime(timeUntilNextClaim) : 'Not Verified')}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    <button
                                                        id="claim-reward-btn"
                                                        className={`w-full mt-6 py-3 px-6 rounded-xl font-bold transition-all duration-300 font-vt323 ${!canClaim ? 'bg-gray-700 text-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 text-white shadow-lg hover:shadow-green-500/50'}`}
                                                        disabled={!canClaim}
                                                        onClick={claimDailyReward}>
                                                        Claim {rewardAmount} TETO
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="lg:col-span-2">
                                                <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 border-2 border-red-500/50 shadow-2xl">
                                                    <h3 className="text-2xl font-bold text-red-900 mb-4 font-vt323">Lottery Wheel</h3>
                                                    <p className="text-red-200 font-vt323">
                                                        The wheel of fortune is not yet implemented.
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    {/* Modal for Wallet Selection */}
                    {showModal && (
                        <div id="wallet-modal" className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-black/80 p-6 rounded-lg shadow-xl max-w-sm w-full border-2 border-red-500/50">
                                <h3 className="text-2xl font-bold text-red-900 mb-4">Connect Wallet</h3>
                                <div id="wallet-options" className="space-y-4">
                                    <button
                                        className="wallet-option-btn w-full py-3 px-6 rounded-lg text-white font-bold bg-gray-800 hover:bg-gray-700 transition-colors"
                                        onClick={() => connectWallet('Phantom')}>
                                        <img src="https://phantom.app/ul/v1/logo.svg" alt="Phantom" className="w-6 h-6 inline-block mr-2" />
                                        Phantom
                                    </button>
                                    <button
                                        className="wallet-option-btn w-full py-3 px-6 rounded-lg text-white font-bold bg-gray-800 hover:bg-gray-700 transition-colors"
                                        onClick={() => connectWallet('Solflare')}>
                                        <img src="https://solflare.com/logo.svg" alt="Solflare" className="w-6 h-6 inline-block mr-2" />
                                        Solflare
                                    </button>
                                </div>
                                <button
                                    id="modal-close-btn"
                                    className="mt-4 w-full py-2 px-6 rounded-lg text-red-400 font-bold hover:text-red-300"
                                    onClick={() => setShowModal(false)}>
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}
                    
                </div>
            );
        };
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
