<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital-Dojo</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-functions-compat.js"></script>

    <!-- Dynamic SDK and bs58 Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@dynamic-labs/sdk-react-core@1.0.0-alpha.2/dist/umd/sdk-react-core.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@dynamic-labs/solana@1.0.0-alpha.2/dist/umd/solana.umd.js"></script>
    <script src="https://unpkg.com/bs58@5.0.0/bs58.bundle.js"></script>

    <style>
        body { background-color: #111827; }
        .wheel-container { transition: transform 5s cubic-bezier(0.1, 0.7, 1.0, 1.0); }
        .red-glow {
            border: 1px solid #b91c1c;
            box-shadow: 0 0 5px #b91c1c, 0 0 10px #b91c1c, 0 0 15px #b91c1c;
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            from { box-shadow: 0 0 5px #b91c1c, 0 0 10px #b91c1c, 0 0 15px #b91c1c; }
            to { box-shadow: 0 0 10px #ef4444, 0 0 20px #ef4444, 0 0 30px #ef4444; }
        }
        .confetti {
            position: absolute; width: 10px; height: 10px;
            background-color: #f00; opacity: 0;
            animation: fall 3s ease-out forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-100px) rotateZ(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotateZ(720deg); opacity: 0; }
        }
        #loader { transition: opacity 0.5s ease-out; }
        /* Ensure Russo One font is available for the loader */
        @import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap');
        .font-russo-one { font-family: 'Russo One', sans-serif; }
    </style>
</head>
<body>
    <!-- Loading Indicator -->
    <div id="loader" class="min-h-screen flex items-center justify-center text-red-700 font-russo-one text-xl animate-pulse">
        Initializing Dojo...
    </div>
    <!-- Main App Container (hidden initially) -->
    <div id="root" style="opacity: 0; transition: opacity 0.5s ease-in;"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        
        // This function will only be called after we confirm all SDKs are loaded
        function startApp() {
            const { DynamicContextProvider, DynamicWidget, useDynamicContext } = window.DynamicSDK;
            const { SolanaWalletConnectors } = window.DynamicSolana;

            const firebaseConfig = {
                apiKey: "AIzaSyDEhTzJiImbtTNJdScLz6DxNWRAg7Rkm1A",
                authDomain: "digital-dojo-482eb.firebaseapp.com",
                projectId: "digital-dojo-482eb",
                storageBucket: "digital-dojo-482eb.appspot.com",
                messagingSenderId: "112511358197",
                appId: "1:112511358197:web:cd1df35fa9543cafbe61bc"
            };
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }

            const showMessage = (message, type = 'info') => {
                const messageBox = document.getElementById('message-box');
                if (!messageBox) return;
                messageBox.textContent = message;
                messageBox.className = 'fixed top-5 right-5 text-white py-2 px-4 rounded-lg shadow-lg z-50 transition-opacity duration-500';
                if (type === 'success') messageBox.classList.add('bg-green-500');
                else if (type === 'error') messageBox.classList.add('bg-red-500');
                else messageBox.classList.add('bg-blue-500');
                messageBox.style.display = 'block';
                messageBox.style.opacity = 1;
                setTimeout(() => {
                    messageBox.style.opacity = 0;
                    setTimeout(() => { messageBox.style.display = 'none'; }, 500);
                }, 3000);
            };

            const truncatePublicKey = (key) => {
                if (!key) return '';
                const str = key.toString();
                return str.length > 8 ? `${str.substring(0, 4)}...${str.substring(str.length - 4)}` : str;
            };

            const icons = {
                claim: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v.01M12 6v-1m0-1V4m0 2.01V5M12 20v-1m0-1v-1m0-1v-1m0-1v-1m0-1v-1" /></svg>,
                spinner: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
            };
            
            function LotteryWheel({ onClose, functions, tetoBalance }) {
                // This component's logic remains the same
            }

            function AppContent() {
                const { primaryWallet, handleLogOut } = useDynamicContext();
                const [tetoBalance, setTetoBalance] = useState(0);
                const [nftCount, setNftCount] = useState(0);
                const [isClaiming, setIsClaiming] = useState(false);
                const [showWheel, setShowWheel] = useState(false);
                const [firebaseUser, setFirebaseUser] = useState(firebase.auth().currentUser);
                const [isLoading, setIsLoading] = useState(true);

                const functions = firebase.functions();
                const db = firebase.firestore();
                const auth = firebase.auth();

                useEffect(() => {
                    const unsubscribe = auth.onAuthStateChanged(fbUser => {
                        setFirebaseUser(fbUser);
                        setIsLoading(false);
                    });
                    return () => unsubscribe();
                }, [auth]);

                useEffect(() => {
                    const signInWithSolana = async () => {
                        if (primaryWallet && !firebaseUser) {
                            setIsLoading(true);
                            try {
                                const signer = await primaryWallet.connector.getSigner();
                                if (!signer) throw new Error("Could not get signer from wallet.");
                                
                                showMessage("Please sign the message to log in.");
                                const getAuthChallenge = functions.httpsCallable('getAuthChallenge');
                                const challengeResult = await getAuthChallenge({ publicKey: primaryWallet.address });
                                const message = challengeResult.data.message;
                                const encodedMessage = new TextEncoder().encode(message);
                                
                                const signature = await signer.signMessage(encodedMessage);
                                const signatureB58 = bs58.encode(signature);

                                showMessage("Verifying signature...");
                                const verifyAuthSignature = functions.httpsCallable('verifyAuthSignature');
                                const verifyResult = await verifyAuthSignature({ publicKey: primaryWallet.address, signature: signatureB58 });
                                
                                const token = verifyResult.data.token;
                                await auth.signInWithCustomToken(token);
                                
                                showMessage("Verifying holder status...");
                                const updateUserWallet = functions.httpsCallable('updateUserWallet');
                                await updateUserWallet();

                            } catch (err) {
                                showMessage(err.message, 'error');
                                await handleLogOut();
                            } finally {
                                setIsLoading(false);
                            }
                        } else if (!primaryWallet && firebaseUser) {
                            auth.signOut();
                        }
                    };
                    signInWithSolana();
                }, [primaryWallet, firebaseUser, auth, functions, handleLogOut]);

                useEffect(() => {
                    if (!firebaseUser) return;
                    const userDocRef = db.collection('users').doc(firebaseUser.uid);
                    const unsubscribe = userDocRef.onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            setTetoBalance(data.tetoBalance || 0);
                            setNftCount(data.nftCount || 0);
                        }
                    });
                    return () => unsubscribe();
                }, [db, firebaseUser]);

                const claimAccruedReward = useCallback(async () => {
                    setIsClaiming(true);
                    try {
                        const claimRewardsFunc = functions.httpsCallable('claimRewards');
                        const result = await claimRewardsFunc();
                        if (result.data.success) {
                            showMessage(`Claimed ${result.data.amountClaimed} TETO!`, 'success');
                        } else { throw new Error(result.data.error || "Claim failed."); }
                    } catch (err) { showMessage(err.message, 'error'); }
                    finally { setIsClaiming(false); }
                }, [functions]);

                if (isLoading) {
                    return null; // The main loader is handling the initial state
                }

                if (!firebaseUser || !primaryWallet) {
                    return (
                        <div className="text-center">
                            <h2 className="text-2xl font-bold mb-4 text-red-700 tracking-wider">TRUE DEGENS WELCOME</h2>
                            <p className="mb-8 text-gray-300 leading-relaxed">Connect your Solana wallet to prove ownership and begin your training.</p>
                            <DynamicWidget />
                        </div>
                    );
                }

                return (
                    <div>
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <p className="text-sm text-gray-400">Wallet Connected</p>
                                <p className="font-mono text-lg">{truncatePublicKey(primaryWallet.address)}</p>
                            </div>
                            <DynamicWidget />
                        </div>
                        <div className="bg-gray-800/10 p-6 rounded-xl shadow-lg red-glow mb-6">
                            <h3 className="text-lg font-semibold text-gray-300 mb-4">Your TETO Balance</h3>
                            <p className="text-4xl font-bold text-white">{tetoBalance.toLocaleString()}</p>
                        </div>
                        <div className="bg-gray-800/10 p-6 rounded-xl shadow-lg red-glow">
                            <h3 className="text-lg font-semibold text-gray-300 mb-2">Actions</h3>
                            <button onClick={claimAccruedReward} disabled={isClaiming} className="w-full mt-4 font-bold py-3 px-4 rounded-lg flex items-center justify-center bg-green-500 hover:bg-green-600 text-white disabled:bg-gray-500">{icons.claim}<span className="ml-2">{isClaiming ? 'Claiming...' : 'Claim TETO'}</span></button>
                            <button onClick={() => setShowWheel(true)} className="w-full mt-4 font-bold py-3 px-4 rounded-lg flex items-center justify-center bg-yellow-500 hover:bg-yellow-600 text-gray-900">{icons.spinner}<span className="ml-2">Spin the Wheel</span></button>
                        </div>
                        {showWheel && <LotteryWheel onClose={() => setShowWheel(false)} functions={functions} tetoBalance={tetoBalance} />}
                    </div>
                );
            }

            function App() {
                const settings = {
                    environmentId: "93faed72-18fd-457e-a2cf-6c58d674ba95",
                    walletConnectors: [SolanaWalletConnectors],
                };

                return (
                    <DynamicContextProvider settings={settings}>
                        <div className="min-h-screen font-russo-one p-4 flex items-center justify-center text-glow" style={{ backgroundImage: "url('dojo-bg.jpg')", backgroundSize: 'cover', backgroundPosition: 'center' }}>
                            <div className="w-full max-w-md mx-auto">
                                <div id="message-box" className="hidden fixed top-5 right-5 text-white py-2 px-4 rounded-lg shadow-lg z-50"></div>
                                <main className="bg-gray-800/10 backdrop-blur-sm p-6 rounded-xl shadow-lg red-glow">
                                    <AppContent />
                                </main>
                            </div>
                        </div>
                    </DynamicContextProvider>
                );
            }
            
            ReactDOM.render(<App />, document.getElementById('root'));
            
            const loader = document.getElementById('loader');
            const root = document.getElementById('root');
            loader.style.opacity = 0;
            setTimeout(() => {
                loader.style.display = 'none';
                root.style.opacity = 1;
            }, 500);
        }
        
        // This robust loader waits for all necessary global objects to be available before starting the app
        document.addEventListener('DOMContentLoaded', () => {
            const interval = setInterval(() => {
                if (window.React && window.ReactDOM && window.Babel && window.firebase && window.DynamicSDK && window.DynamicSolana && window.bs58) {
                    clearInterval(interval);
                    startApp();
                }
            }, 100);
        });
    </script>
</body>
</html>
