<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital-Dojo</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-functions-compat.js"></script>

    <style>
        body { background-color: #111827; }
        .wheel-container { transition: transform 5s cubic-bezier(0.1, 0.7, 1.0, 1.0); }
        .red-glow {
            border: 1px solid #b91c1c;
            box-shadow: 0 0 5px #b91c1c, 0 0 10px #b91c1c, 0 0 15px #b91c1c;
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            from { box-shadow: 0 0 5px #b91c1c, 0 0 10px #b91c1c, 0 0 15px #b91c1c; }
            to { box-shadow: 0 0 10px #ef4444, 0 0 20px #ef4444, 0 0 30px #ef4444; }
        }
        .confetti {
            position: absolute; width: 10px; height: 10px;
            background-color: #f00; opacity: 0;
            animation: fall 3s ease-out forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-100px) rotateZ(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotateZ(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEhTzJiImbtTNJdScLz6DxNWRAg7Rkm1A",
            authDomain: "digital-dojo-482eb.firebaseapp.com",
            projectId: "digital-dojo-482eb",
            storageBucket: "digital-dojo-482eb.appspot.com",
            messagingSenderId: "112511358197",
            appId: "1:112511358197:web:cd1df35fa9543cafbe61bc"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <script type="module">
        import React, { useState, useEffect, useCallback, useRef } from "https://cdn.skypack.dev/react";
        import ReactDOM from "https://cdn.skypack.dev/react-dom";
        import bs58 from "https://cdn.skypack.dev/bs58";

        const e = React.createElement;

        const showMessage = (message, type = 'info') => {
            const messageBox = document.getElementById('message-box');
            if (!messageBox) return;
            messageBox.textContent = message;
            messageBox.classList.remove('bg-blue-500', 'bg-green-500', 'bg-red-500');
            if (type === 'success') messageBox.classList.add('bg-green-500');
            else if (type === 'error') messageBox.classList.add('bg-red-500');
            else messageBox.classList.add('bg-blue-500');
            messageBox.style.display = 'block';
            messageBox.style.opacity = 1;
            setTimeout(() => {
                messageBox.style.opacity = 0;
                setTimeout(() => { messageBox.style.display = 'none'; }, 500);
            }, 3000);
        };

        const truncatePublicKey = (key) => {
            if (!key) return '';
            const str = key.toString();
            return str.length > 8 ? `${str.substring(0, 4)}...${str.substring(str.length - 4)}` : str;
        };

        const icons = {
            wallet: e('svg', { className: "w-6 h-6", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" }, e('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: "2", d: "M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" })),
            claim: e('svg', { className: "w-6 h-6", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" }, e('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: "2", d: "M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v.01M12 6v-1m0-1V4m0 2.01V5M12 20v-1m0-1v-1m0-1v-1m0-1v-1m0-1v-1" })),
            spinner: e('svg', { className: "w-6 h-6", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24"}, e('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: "2", d: "M12 6v6m0 0v6m0-6h6m-6 0H6" }))
        };
        
        function LotteryWheel({ onClose, functions, tetoBalance }) {
            const [isSpinning, setIsSpinning] = useState(false);
            const [rotation, setRotation] = useState(0);
            const [winningSegment, setWinningSegment] = useState(null);
            const [showConfetti, setShowConfetti] = useState(false);
            const [hCaptchaToken, setHCaptchaToken] = useState(null);
            const captchaRef = useRef(null);

            const segments = [
                { text: '2x', color: 'bg-green-500', value: 20 }, 
                { text: '0x', color: 'bg-red-700', value: 0 },
                { text: '3x', color: 'bg-yellow-500', value: 30 }, 
                { text: '0x', color: 'bg-red-700', value: 0 },
                { text: '2x', color: 'bg-green-500', value: 20 }, 
                { text: '0x', color: 'bg-red-700', value: 0 },
            ];
            const segmentAngle = 360 / segments.length;

            useEffect(() => {
                if (window.hcaptcha && !captchaRef.current) {
                    captchaRef.current = window.hcaptcha.render('hcaptcha-container', {
                        sitekey: '50b2fe65-b00b-4b98-a113-19a891da2257', // NOTE: This is a test key. Replace with your actual site key.
                        callback: (token) => setHCaptchaToken(token),
                        'expired-callback': () => setHCaptchaToken(null),
                    });
                }
            }, []);

            const playSound = (type, prize = 0) => { /* ... (same as before) ... */ };

            const handleSpin = async () => {
                if (!hCaptchaToken) {
                    return showMessage("Please complete the captcha first.", 'error');
                }
                if (isSpinning || tetoBalance < 10) {
                    showMessage(tetoBalance < 10 ? "Not enough TETO." : "Spin in progress.", 'error');
                    return;
                }
                setIsSpinning(true);
                setWinningSegment(null);
                setShowConfetti(false);
                await Tone.start();

                let tickCount = 0;
                const tickInterval = setInterval(() => { playSound('tick'); tickCount++; if (tickCount > 30) clearInterval(tickInterval); }, 150);
                
                try {
                    const spinTheWheelFunc = functions.httpsCallable('spinTheWheel');
                    const result = await spinTheWheelFunc({ hCaptchaToken });
                    if (!result.data.success) throw new Error("Spin failed on server.");

                    const { prizeSegment, prize } = result.data;
                    const randomOffset = Math.random() * (segmentAngle - 10) - (segmentAngle / 2 - 5);
                    const targetAngle = (prizeSegment * segmentAngle) + (360 * 6) + randomOffset;
                    setRotation(rotation + targetAngle);

                    setTimeout(() => {
                        clearInterval(tickInterval);
                        showMessage(prize > 0 ? `You won ${prize} TETO!` : 'Better luck next time!', prize > 0 ? 'success' : 'info');
                        playSound(prize > 0 ? 'win' : 'lose', prize);
                        setWinningSegment(prizeSegment);
                        if (prize === 30) setShowConfetti(true);
                        setIsSpinning(false);
                        window.hcaptcha.reset(captchaRef.current);
                        setHCaptchaToken(null);
                    }, 5000);

                } catch (error) {
                    clearInterval(tickInterval);
                    console.error("Error spinning wheel:", error);
                    showMessage(error.message || "Spin failed.", 'error');
                    setIsSpinning(false);
                    window.hcaptcha.reset(captchaRef.current);
                    setHCaptchaToken(null);
                }
            };

            return e('div', { className: "fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 backdrop-blur-sm" },
                e('div', { className: "relative w-full max-w-md p-4" },
                    e('div', { className: "relative w-full aspect-square" },
                        e('div', { className: "absolute inset-0 flex items-center justify-center" },
                            e('div', { style: { transform: `rotate(${rotation}deg)` }, className: "wheel-container w-full h-full rounded-full border-8 border-yellow-400 shadow-lg" },
                                segments.map((segment, i) => e('div', {
                                    key: i, className: `absolute w-1/2 h-1/2 ${segment.color} origin-bottom-right flex items-center justify-start transition-all duration-500`,
                                    style: { transform: `rotate(${i * segmentAngle}deg) skewX(${90 - segmentAngle}deg)`, ...(winningSegment === i && { boxShadow: '0 0 20px 10px #fff700' }) }
                                }, e('span', { className: "text-white text-2xl font-bold", style: { transform: `skewX(${-(90-segmentAngle)}deg) rotate(${segmentAngle/2}deg) translate(30%, -50%)` } }, segment.text)))
                            )
                        ),
                        e('div', { className: "absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 rounded-full bg-gray-800 border-4 border-yellow-400" }),
                        e('div', { className: "absolute top-0 left-1/2 -translate-x-1/2 -translate-y-2 w-0 h-0 border-l-8 border-r-8 border-b-16 border-l-transparent border-r-transparent border-b-yellow-400" }),
                        showConfetti && Array.from({ length: 50 }).map((_, i) => e('div', {
                            key: i, className: 'confetti',
                            style: { left: `${Math.random() * 100}%`, backgroundColor: ['#f00', '#0f0', '#00f', '#ff0', '#0ff'][Math.floor(Math.random() * 5)], animationDelay: `${Math.random() * 2}s` }
                        }))
                    ),
                    e('div', { className: "mt-8 text-center flex flex-col items-center" },
                        e('div', { id: 'hcaptcha-container', className: 'mb-4' }),
                        e('button', { onClick: handleSpin, disabled: isSpinning || tetoBalance < 10 || !hCaptchaToken, className: "bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-lg text-xl disabled:bg-gray-500 disabled:cursor-not-allowed" }, isSpinning ? 'Spinning...' : 'Spin for 10 TETO'),
                        e('button', { onClick: onClose, className: "mt-4 text-gray-300 hover:text-white" }, "Close")
                    )
                )
            );
        }

        function App({ auth, db, functions, user }) {
            const [publicKey, setPublicKey] = useState(user?.uid || null);
            const [tetoBalance, setTetoBalance] = useState(0);
            const [nftCount, setNftCount] = useState(0);
            const [isLoading, setIsLoading] = useState(!user);
            const [isClaiming, setIsClaiming] = useState(false);
            const [showWheel, setShowWheel] = useState(false);

            useEffect(() => {
                if (!user) { setIsLoading(false); return; };
                const userDocRef = db.collection('users').doc(user.uid);
                const unsubscribe = userDocRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        setTetoBalance(data.tetoBalance || 0);
                        setNftCount(data.nftCount || 0);
                    }
                    setPublicKey(user.uid);
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, [db, user]);

            const connectWallet = useCallback(async (walletProviderName) => { /* ... (same as before) ... */ }, [auth, functions]);
            const disconnectWallet = useCallback(async () => { /* ... (same as before) ... */ }, [auth]);
            const claimAccruedReward = useCallback(async () => { /* ... (same as before) ... */ }, [functions]);

            const renderContent = () => {
                if (isLoading) {
                    return e('div', { className: "text-center text-gray-400 animate-pulse" }, "Initializing Dojo...");
                }
                if (!publicKey) {
                    return e('div', { className: "text-center" },
                        e('h2', { className: "text-2xl font-bold mb-4 text-red-700 tracking-wider" }, "TRUE DEGENS WELCOME"),
                        e('p', { className: "mb-8 text-gray-300 leading-relaxed" }, "Connect your Solana wallet to prove ownership and begin your training."),
                        e('div', { className: "flex space-x-4" },
                            e('button', { onClick: () => connectWallet('phantom'), className: "w-full bg-red-700 hover:bg-red-800 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center" }, icons.wallet, e('span', { className: 'ml-2' }, 'Connect Phantom')),
                            e('button', { onClick: () => connectWallet('solflare'), className: "w-full bg-red-700 hover:bg-red-800 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center" }, icons.wallet, e('span', { className: 'ml-2' }, 'Connect Solflare'))
                        )
                    );
                }
                return e('div', null,
                    e('div', { className: "flex justify-between items-center mb-6" },
                        e('div', null, e('p', { className: "text-sm text-gray-400" }, "Wallet Connected"), e('p', { className: "font-mono text-lg" }, truncatePublicKey(publicKey))),
                        e('button', { onClick: disconnectWallet, className: "bg-red-700 hover:bg-red-800 text-white font-bold py-2 px-4 rounded-lg" }, "Disconnect")
                    ),
                    e('div', { className: "bg-gray-800/10 p-6 rounded-xl shadow-lg red-glow mb-6" },
                        e('h3', { className: "text-lg font-semibold text-gray-300 mb-4" }, "Your TETO Balance"),
                        e('p', { className: "text-4xl font-bold text-white" }, tetoBalance.toLocaleString())
                    ),
                    e('div', { className: "bg-gray-800/10 p-6 rounded-xl shadow-lg red-glow" },
                        e('h3', { className: "text-lg font-semibold text-gray-300 mb-2" }, "Actions"),
                        e('button', { onClick: claimAccruedReward, disabled: isClaiming, className: "w-full mt-4 font-bold py-3 px-4 rounded-lg flex items-center justify-center bg-green-500 hover:bg-green-600 text-white disabled:bg-gray-500" }, icons.claim, e('span', { className: 'ml-2' }, isClaiming ? 'Claiming...' : 'Claim TETO')),
                        e('button', { onClick: () => setShowWheel(true), className: "w-full mt-4 font-bold py-3 px-4 rounded-lg flex items-center justify-center bg-yellow-500 hover:bg-yellow-600 text-gray-900" }, icons.spinner, e('span', { className: 'ml-2' }, "Spin the Wheel"))
                    )
                );
            };

            return e(React.Fragment, null,
                e('style', null, `@import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap'); .font-russo-one { font-family: 'Russo One', sans-serif; } .text-glow { text-shadow: 0 0 8px rgba(255, 0, 0, 0.4); }`),
                e('div', { className: "min-h-screen font-russo-one p-4 flex items-center justify-center text-glow", style: { backgroundImage: "url('dojo-bg.jpg')", backgroundSize: 'cover', backgroundPosition: 'center' } },
                    e('div', { className: "w-full max-w-md mx-auto" },
                        e('div', { id: "message-box", className: "hidden fixed top-5 right-5 text-white py-2 px-4 rounded-lg shadow-lg z-50" }),
                        e('main', { className: "bg-gray-800/10 backdrop-blur-sm p-6 rounded-xl shadow-lg red-glow" }, renderContent()),
                        showWheel && e(LotteryWheel, { onClose: () => setShowWheel(false), functions, tetoBalance })
                    )
                )
            );
        }

        function initializeApp() {
            try {
                const auth = firebase.auth();
                const db = firebase.firestore();
                const functions = firebase.functions();
                
                auth.onAuthStateChanged(user => {
                    ReactDOM.render(e(App, { auth, db, functions, user }), document.getElementById('root'));
                });
            } catch (error) {
                console.error("Critical Firebase Error:", error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
